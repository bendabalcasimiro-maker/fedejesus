<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Curso</title>
    <link rel="stylesheet" href="estilos-auth.css">
</head>
<body>

    <div class="auth-container">
        <h2>Estudio Adicional</h2>
        <p>Por favor, identifícate para acceder al curso</p>
        
        <form id="auth-form">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <button type="submit" id="btn-action">Iniciar Sesión</button>
        </form>
        
        <p class="toggle-text">
            ¿No tienes cuenta? <a href="#" id="toggle-auth">Regístrate aquí</a>
        </p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
